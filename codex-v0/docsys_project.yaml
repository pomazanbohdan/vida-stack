schema_version: 1
root_bootstrap:
  artifact_prefix: project/repository
  artifact_type: bootstrap_doc
layer_owner_rules:
  by_relative_path:
    - pattern: docs/product/spec/**
      layer: product_spec
      owner: product
    - pattern: docs/product/research/**
      layer: product_research
      owner: product
    - pattern: docs/product/index.md
      layer: product_index
      owner: product
    - pattern: docs/process/**
      layer: project_process
      owner: project
    - pattern: docs/project-memory/**
      layer: project_memory
      owner: project
    - pattern: vida/config/instructions/**
      layer: instruction_canon
      owner: product
    - pattern: vida/config/**
      layer: executable_law
      owner: product
    - pattern: README.md
      layer: repository_doc
      owner: project
    - pattern: CONTRIBUTING.md
      layer: repository_doc
      owner: project
    - pattern: VERSION-PLAN.md
      layer: repository_doc
      owner: project
  by_artifact_prefix:
    - pattern: product/spec/
      layer: product_spec
      owner: product
    - pattern: product/research/
      layer: product_research
      owner: product
    - pattern: product/index
      layer: product_index
      owner: product
    - pattern: process/
      layer: project_process
      owner: project
    - pattern: project-memory/
      layer: project_memory
      owner: project
    - pattern: project/repository/
      layer: repository_doc
      owner: project
    - pattern: config/instructions/
      layer: instruction_canon
      owner: product
    - pattern: config/
      layer: executable_law
      owner: product
