schema_version: 1
footer_optional:
  - scope: filename
    glob: "AGENTS.md"
    reason: AGENTS.md is the canonical bootstrap carrier; metadata lives in AGENTS.sidecar.md and AGENTS.changelog.jsonl
changelog_only:
  - scope: filename
    glob: "AGENTS.md"
    reason: AGENTS.md is the canonical bootstrap carrier and uses changelog-only mutation
mutation_disabled:
  - scope: filename
    glob: "AGENTS.md"
    reason: AGENTS.md bootstrap body mutation is disabled through codex; mutate AGENTS.sidecar.md for canonical metadata and project context
scan_ignored:
  - scope: relative_path
    glob: ".agents/**"
    reason: skill source markdown is outside the active project documentation canon
  - scope: relative_path
    glob: "target/**"
    reason: build output markdown is outside the active project documentation canon
profiles:
  active-canon:
    - docs/framework/plans
    - docs/framework/research
    - docs/product
    - docs/process
    - docs/project-memory
    - vida/config/instructions
  active-canon-strict:
    - docs/framework/plans
    - docs/framework/research
    - docs/product
    - docs/process
    - docs/project-memory
    - vida/config/instructions
  framework-active:
    - docs/framework/plans
    - docs/framework/research
    - vida/config/instructions
  product-active:
    - docs/product
    - docs/process
    - docs/project-memory
  repo-root:
    - .
