schema_version: 1
footer_optional:
  - scope: repo_root
    glob: "*.md"
    reason: root bootstrap markdown is a transitional metadata exception until VIDA 1.0.0
changelog_only:
  - scope: repo_root
    glob: "*.md"
    reason: root bootstrap markdown uses changelog-only mutation during the pre-1.0.0 transition
mutation_disabled:
  - scope: repo_root
    glob: "*.md"
    reason: root bootstrap markdown body mutation is disabled through codex during the pre-1.0.0 transition
scan_ignored:
  - scope: relative_path
    glob: ".agents/**"
    reason: skill source markdown is outside the active project documentation canon
  - scope: relative_path
    glob: "target/**"
    reason: build output markdown is outside the active project documentation canon
profiles:
  active-canon:
    - docs/framework/plans
    - docs/framework/research
    - docs/product
    - docs/process
    - docs/project-memory
    - vida/config/instructions
  active-canon-strict:
    - docs/framework/plans
    - docs/framework/research
    - docs/product
    - docs/process
    - docs/project-memory
    - vida/config/instructions
  framework-active:
    - docs/framework/plans
    - docs/framework/research
    - vida/config/instructions
  product-active:
    - docs/product
    - docs/process
    - docs/project-memory
  repo-root:
    - .
