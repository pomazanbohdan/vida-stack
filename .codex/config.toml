[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 2

[agents.development_implementer]
description = "Internal implementation lane for one bounded delivery-task or execution-block packet with explicit write scope."
config_file = "agents/development-implementer.toml"

[agents.development_coach]
description = "Internal coach lane for bounded formative review against one delivery-task packet before independent verification."
config_file = "agents/development-coach.toml"

[agents.development_verifier]
description = "Internal verification lane for independent proof checks on one bounded delivery-task packet and its proof target."
config_file = "agents/development-verifier.toml"

[agents.development_escalation]
description = "Internal escalation lane for blocked routes, shared-scope conflicts, and architecture decisions that cannot close inside the normal delivery-task flow."
config_file = "agents/development-escalation.toml"
