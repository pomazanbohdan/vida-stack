project:
  id: test-project
  overlay_version: 1

project_bootstrap:
  enabled: true
  docs_root: docs
  process_root: docs/process
  research_root: docs/research
  readme_doc: README.md
  architecture_doc: docs/product/architecture.md
  decisions_doc: docs/process/decisions.md
  environments_doc: docs/process/environments.md
  project_operations_doc: docs/process/project-operations.md
  agent_system_doc: docs/process/agent-system.md
  allow_scaffold_missing: false
  require_launch_confirmation: false

language_policy:
  user_communication: english
  reasoning: english
  documentation: english
  todo_protocol: english

host_environment:
  cli_system: codex
  codex:
    agents: &codex_agent_catalog
      junior:
        tier: junior
        rate: 1
        reasoning_band: low
        model: gpt-5.4
        model_reasoning_effort: low
        sandbox_mode: workspace-write
        default_runtime_role: worker
        runtime_roles:
          - worker
        task_classes:
          - implementation
          - delivery_task
          - execution_block
      middle:
        tier: middle
        rate: 4
        reasoning_band: medium
        model: gpt-5.4
        model_reasoning_effort: medium
        sandbox_mode: workspace-write
        default_runtime_role: coach
        runtime_roles:
          - business_analyst
          - pm
          - coach
          - worker
        task_classes:
          - specification
          - planning
          - coach
          - implementation_medium
      senior:
        tier: senior
        rate: 16
        reasoning_band: high
        model: gpt-5.4
        model_reasoning_effort: high
        sandbox_mode: read-only
        default_runtime_role: verifier
        runtime_roles:
          - verifier
          - prover
        task_classes:
          - verification
          - review
          - quality_gate
          - release_readiness
      architect:
        tier: architect
        rate: 32
        reasoning_band: xhigh
        model: gpt-5.4
        model_reasoning_effort: high
        sandbox_mode: read-only
        default_runtime_role: solution_architect
        runtime_roles:
          - solution_architect
        task_classes:
          - architecture
          - execution_preparation
          - hard_escalation
          - meta_analysis
  systems:
    codex:
      enabled: true
      execution_class: internal
      materialization_mode: codex_toml_catalog_render
      template_root: .codex
      runtime_root: .codex
      carriers: *codex_agent_catalog
    qwen:
      enabled: true
      execution_class: external
      materialization_mode: copy_tree_only
      template_root: .qwen
      runtime_root: .qwen
      carriers:
        qwen-primary:
          tier: qwen
          rate: 4
          reasoning_band: medium
          default_runtime_role: worker
          runtime_roles:
            - worker
          task_classes:
            - implementation
            - research
    hermes:
      enabled: true
      execution_class: external
      materialization_mode: copy_tree_only
      template_root: .hermes
      runtime_root: .hermes
      carriers:
        hermes-primary:
          tier: hermes
          rate: 4
          reasoning_band: medium
          default_runtime_role: worker
          runtime_roles:
            - worker
          task_classes:
            - specification
            - planning
    opencode:
      enabled: true
      execution_class: external
      materialization_mode: copy_tree_only
      template_root: .opencode
      runtime_root: .opencode
      carriers:
        opencode-primary:
          tier: opencode
          rate: 4
          reasoning_band: medium
          default_runtime_role: worker
          runtime_roles:
            - worker
          task_classes:
            - implementation

protocol_activation:
  agent_system: true

agent_extensions:
  enabled: false
  map_doc: .vida/project/agent-extensions/README.md
  registries:
    roles: .vida/project/agent-extensions/roles.yaml
    skills: .vida/project/agent-extensions/skills.yaml
    profiles: .vida/project/agent-extensions/profiles.yaml
    flows: .vida/project/agent-extensions/flows.yaml
    dispatch_aliases: .vida/project/agent-extensions/dispatch-aliases.yaml
  enabled_framework_roles:
    - orchestrator
    - worker
    - business_analyst
    - pm
    - coach
    - verifier
    - prover
  enabled_standard_flow_sets:
    - minimal
  enabled_project_roles: []
  enabled_project_skills: []
  enabled_shared_skills: []
  enabled_project_profiles: []
  enabled_project_flows: []
  default_flow_set: minimal
  role_selection:
    mode: auto
    fallback_role: orchestrator
    conversation_modes:
      scope_discussion:
        enabled: true
        role: business_analyst
        single_task_only: true
        tracked_flow_entry: spec-pack
        allow_freeform_chat: true
      pbi_discussion:
        enabled: true
        role: pm
        single_task_only: true
        tracked_flow_entry: work-pool-pack
        allow_freeform_chat: true
  validation:
    require_registry_files: true
    require_unique_ids: true
    require_framework_role_compatibility: true
    require_skill_role_compatibility: true
    require_profile_resolution: true
    require_flow_resolution: true
    fail_closed_on_validation_error: true

autonomous_execution:
  next_task_boundary_analysis: true
  next_task_boundary_report: brief_plan
  next_task_boundary_report_gating: false
  dependent_coverage_autoupdate: true
  agent_only_development: true

framework_self_diagnosis:
  enabled: false
  silent_mode: true
  auto_capture_bugs: true
  parent_issue: ""
  defer_fix_until_task_boundary: true
  session_reflection_required: true
  platform_direction: agentic_engineering_platform
  quality_token_efficiency: equal_weight
  session_reflection_criteria:
    - architecture_cleanliness
    - completeness
    - token_efficiency
    - orchestration_efficiency
    - instruction_clarity
    - instruction_runtime_consistency

pack_router_keywords:
  research: research
  spec: spec
  pool: pool
  pool_strong: form-task
  pool_dependency: dependency
  dev: implement
  bug: bug
  reflect: reflect
  reflect_strong: framework,self-analysis

agent_system:
  init_on_boot: true
  mode: native
  state_owner: orchestrator_only
  max_parallel_agents: 4
  routing: {}
  scoring: {}

