config_id: sample.prompt_template_config
version: 1
instruction_contract_ref: "docs/framework/templates/instruction-contract.yaml"
rendering_target: "provider.runtime"
template_format: "markdown_xml_hybrid"
system_prompt_template:
  role_header: "## Role"
  instruction_header: "## Instructions"
  constraint_header: "## Constraints"
  output_header: "## Output Contract"
parameter_bindings:
  role_id: "{{ role_id }}"
  mission: "{{ mission }}"
  scope_boundary: "{{ scope_boundary }}"
runtime_bindings:
  model_hint: "provider-default"
  temperature_mode: "deterministic"
  context_policy: "bounded"
tool_exposure:
  include:
    - "allowed tools from instruction contract"
  exclude:
    - "forbidden tools from instruction contract"
output_rendering:
  structured_output_required: true
  schema_source: "instruction_contract.output_contract"
