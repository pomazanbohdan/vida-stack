artifact_name: boot_migration_gate
artifact_type: machine
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
entity_type: BootVerdict
canonical_source_refs:
  - _vida/docs/plans/2026-03-08-vida-0.3-db-first-runtime-spec.md
  - _vida/docs/plans/2026-03-08-vida-0.3-migration-kernel-spec.md
  - vida/docs/spec/canonical-machine-map.md
purpose: Fail-closed startup compatibility, migration, and doctor gating.
initial_state: boot_unchecked
states:
  - boot_unchecked
  - compat_checked
  - migration_required
  - migration_in_progress
  - doctor_required
  - ready_to_boot
  - boot_blocked
  - booted
  - boot_failed
terminal_states:
  - booted
  - boot_failed
verdict_classes:
  - compatible
  - compatible_with_migration_required
  - incompatible
  - insufficient_evidence
  - doctor_blocking
  - unsafe_to_boot
events:
  - compatibility_checked
  - migration_required_detected
  - migration_started
  - migration_applied
  - doctor_verdict_issued
  - boot_allowed
  - boot_blocked
  - boot_started
  - boot_failed
guards_catalog:
  - compatibility_class_supported
  - migration_proof_satisfied
  - doctor_verdict_non_blocking
  - instruction_revision_supported
transitions:
  - name: check_compatibility
    command: boot.check
    from:
      - boot_unchecked
    to: compat_checked
    guards:
      all_of:
        - compatibility_class_supported
        - instruction_revision_supported
    receipts:
      - compat_checked_receipt

  - name: require_migration
    command: boot.require_migration
    from:
      - compat_checked
    to: migration_required
    guards:
      all_of:
        - compatibility_class_supported
    receipts:
      - migration_required_receipt

  - name: allow_boot
    command: boot.allow
    from:
      - compat_checked
      - doctor_required
      - migration_in_progress
    to: ready_to_boot
    guards:
      all_of:
        - migration_proof_satisfied
        - doctor_verdict_non_blocking
    receipts:
      - boot_allowed_receipt

  - name: block_boot
    command: boot.block
    from:
      - compat_checked
      - migration_required
      - doctor_required
    to: boot_blocked
    guards:
      all_of:
        - compatibility_class_supported
    receipts:
      - boot_blocked_receipt
