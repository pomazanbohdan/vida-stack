artifact_name: approval_lifecycle
artifact_type: machine
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
entity_type: Approval
canonical_source_refs:
  - docs/framework/plans/vida-0.3-state-kernel-schema-spec.md
  - docs/framework/plans/vida-0.3-route-and-receipt-spec.md
  - docs/product/spec/canonical-machine-map.md
purpose: Governance approval lifecycle, distinct from technical verification.
initial_state: not_required
states:
  - not_required
  - requested
  - pending
  - approved
  - rejected
  - expired
  - escalated
  - withdrawn
  - closed
terminal_states:
  - closed
events:
  - approval_required_determined
  - approval_requested
  - approval_received
  - approval_rejected
  - approval_expired
  - approval_escalated
  - approval_withdrawn
  - approval_closed
guards_catalog:
  - approval_required_by_policy
  - approver_class_allowed
  - approval_not_expired
  - approval_receipt_valid
transitions:
  - name: request_approval
    command: approval.request
    from:
      - not_required
      - withdrawn
    to: requested
    guards:
      all_of:
        - approval_required_by_policy
    receipts:
      - approval_requested_receipt

  - name: pend_approval
    command: approval.pending
    from:
      - requested
    to: pending
    guards:
      all_of:
        - approver_class_allowed
    receipts:
      - approval_state_changed_receipt

  - name: receive_approval
    command: approval.receive
    from:
      - pending
    to: approved
    guards:
      all_of:
        - approval_not_expired
        - approval_receipt_valid
    receipts:
      - approval_received_receipt

  - name: reject_approval
    command: approval.reject
    from:
      - pending
    to: rejected
    guards:
      all_of:
        - approval_receipt_valid
    receipts:
      - approval_rejected_receipt

  - name: expire_approval
    command: approval.expire
    from:
      - pending
    to: expired
    guards:
      all_of:
        - approver_class_allowed
    receipts:
      - approval_expired_receipt

  - name: escalate_approval
    command: approval.escalate
    from:
      - expired
      - rejected
    to: escalated
    guards:
      all_of:
        - approval_required_by_policy
    receipts:
      - approval_escalated_receipt
