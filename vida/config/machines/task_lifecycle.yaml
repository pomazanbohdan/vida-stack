artifact_name: task_lifecycle
artifact_type: machine
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
entity_type: Task
canonical_source_refs:
  - docs/framework/history/plans/2026-03-08-vida-0.3-state-kernel-schema-spec.md
  - docs/product/spec/partial-development-kernel-scope.md
  - docs/product/spec/canonical-machine-map.md
purpose: Canonical task lifecycle law without overloading detailed waiting postures into Task.lifecycle_state.
initial_state: open
states:
  - open
  - in_progress
  - closed
  - deferred
terminal_states:
  - closed
events:
  - task_created
  - task_started
  - task_deferred
  - task_resumed
  - task_closed
  - task_reopened
guards_catalog:
  - execution_plan_present
  - route_authorized_for_start
  - deferral_reason_present
  - closure_ready_projection
  - verification_state_satisfied
  - approval_state_satisfied
  - no_reconciliation_blocker
transitions:
  - name: start_task
    command: task.start
    from:
      - open
      - deferred
    to: in_progress
    guards:
      all_of:
        - execution_plan_present
        - route_authorized_for_start
    receipts:
      - task_state_changed_receipt

  - name: defer_task
    command: task.defer
    from:
      - open
      - in_progress
    to: deferred
    guards:
      all_of:
        - deferral_reason_present
    receipts:
      - task_state_changed_receipt

  - name: resume_task
    command: task.resume
    from:
      - deferred
    to: open
    guards:
      all_of:
        - execution_plan_present
    receipts:
      - task_state_changed_receipt

  - name: close_task
    command: task.close
    from:
      - open
      - in_progress
      - deferred
    to: closed
    guards:
      all_of:
        - closure_ready_projection
        - verification_state_satisfied
        - approval_state_satisfied
        - no_reconciliation_blocker
    receipts:
      - task_state_changed_receipt

  - name: reopen_task
    command: task.reopen
    from:
      - closed
    to: open
    guards:
      all_of:
        - no_reconciliation_blocker
    receipts:
      - task_state_changed_receipt
