artifact_name: execution_plan
artifact_type: machine
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
entity_type: ExecutionPlan
canonical_source_refs:
  - docs/framework/history/plans/2026-03-08-vida-0.3-state-kernel-schema-spec.md
  - docs/product/spec/canonical-machine-map.md
purpose: Execution telemetry and resumability support, kept separate from task lifecycle.
initial_state: todo
states:
  - todo
  - doing
  - done
  - blocked
terminal_states:
  - done
completion_results:
  - done
  - partial
  - failed
events:
  - plan_created
  - step_started
  - step_completed
  - step_blocked
  - step_unblocked
  - block_completed
  - block_superseded
guards_catalog:
  - dependencies_satisfied
  - next_step_known
  - blocker_absent
  - resume_hint_present_when_required
transitions:
  - name: start_step
    command: run.step.start
    from:
      - todo
    to: doing
    guards:
      all_of:
        - dependencies_satisfied
        - next_step_known
        - blocker_absent
    receipts:
      - execution_started_receipt

  - name: complete_step
    command: run.step.complete
    from:
      - doing
    to: done
    guards:
      all_of:
        - resume_hint_present_when_required
    receipts:
      - execution_completed_receipt

  - name: block_step
    command: run.step.block
    from:
      - todo
      - doing
    to: blocked
    guards:
      all_of:
        - next_step_known
    receipts:
      - execution_failed_receipt

  - name: unblock_step
    command: run.step.unblock
    from:
      - blocked
    to: todo
    guards:
      all_of:
        - blocker_absent
    receipts:
      - execution_resumed_receipt
