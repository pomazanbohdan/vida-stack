artifact_name: verification_lifecycle
artifact_type: machine
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
entity_type: Verification
canonical_source_refs:
  - docs/process/framework-source-lineage-index.md
  - docs/product/spec/canonical-machine-map.md
purpose: Independent verification with explicit proof coverage and aggregation policy.
initial_state: not_requested
states:
  - not_requested
  - requested
  - assigned
  - in_verification
  - partial_results_received
  - aggregation_pending
  - passed
  - failed
  - inconclusive
  - superseded
  - closed
terminal_states:
  - closed
events:
  - verification_requested
  - verifier_assigned
  - verification_started
  - verification_partial_received
  - verification_aggregated
  - verification_passed
  - verification_failed
  - verification_inconclusive
  - verification_superseded
  - verification_closed
guards_catalog:
  - verifier_independent
  - minimum_verifier_count_satisfied
  - proof_category_coverage_satisfied
  - aggregation_policy_satisfied
transitions:
  - name: request_verification
    command: verify.request
    from:
      - not_requested
    to: requested
    guards:
      all_of:
        - proof_category_coverage_satisfied
    receipts:
      - verification_requested_receipt

  - name: assign_verifier
    command: verify.assign
    from:
      - requested
    to: assigned
    guards:
      all_of:
        - verifier_independent
        - minimum_verifier_count_satisfied
    receipts:
      - verifier_assigned_receipt

  - name: start_verification
    command: verify.start
    from:
      - assigned
    to: in_verification
    guards:
      all_of:
        - verifier_independent
    receipts:
      - verification_state_changed_receipt

  - name: collect_partial_results
    command: verify.partial
    from:
      - in_verification
    to: partial_results_received
    guards:
      all_of:
        - proof_category_coverage_satisfied
    receipts:
      - verification_partial_receipt

  - name: aggregate_verification
    command: verify.aggregate
    from:
      - partial_results_received
      - in_verification
    to: aggregation_pending
    guards:
      all_of:
        - aggregation_policy_satisfied
    receipts:
      - verification_aggregate_receipt

  - name: pass_verification
    command: verify.pass
    from:
      - aggregation_pending
      - in_verification
    to: passed
    guards:
      all_of:
        - aggregation_policy_satisfied
        - proof_category_coverage_satisfied
    receipts:
      - verification_passed_receipt

  - name: fail_verification
    command: verify.fail
    from:
      - aggregation_pending
      - in_verification
    to: failed
    guards:
      all_of:
        - proof_category_coverage_satisfied
    receipts:
      - verification_failed_receipt

  - name: mark_inconclusive
    command: verify.inconclusive
    from:
      - aggregation_pending
      - in_verification
    to: inconclusive
    guards:
      all_of:
        - proof_category_coverage_satisfied
    receipts:
      - verification_inconclusive_receipt
