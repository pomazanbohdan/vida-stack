artifact_name: closure_policy
artifact_type: policy
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
canonical_source_refs:
  - docs/process/framework-source-lineage-index.md
  - docs/process/framework-source-lineage-index.md
  - vida.config.yaml
kernel_rules:
  closure_ready:
    all_of:
      - task_in_progress_or_deferred
      - route_progression_completed
      - verification_state_satisfied
      - approval_state_satisfied
      - no_open_blockers
      - no_reconciliation_blocker
      - required_proof_categories_present

  approval_required_when:
    any_of:
      - task_risk_high
      - task_changes_external_interface
      - task_touches_production
      - task_involves_schema_migration

  approval_satisfied:
    any_of:
      - approval_not_required
      - valid_approval_receipt_present

  no_reconciliation_blocker:
    all_of:
      - reconciliation_class_not_stale_in_progress
      - reconciliation_class_not_drift_detected
      - reconciliation_class_not_invalid_state

autonomous_execution_overlay:
  next_task_boundary_analysis: true
  next_task_boundary_report: brief_plan
  next_task_boundary_report_gating: false
  dependent_coverage_autoupdate: true

framework_self_diagnosis_overlay:
  enabled: true
  silent_mode: true
  auto_capture_bugs: true
  parent_issue: vida-stack-2d9
  defer_fix_until_task_boundary: true
  session_reflection_required: true
  quality_token_efficiency: equal_weight
