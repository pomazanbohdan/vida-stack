artifact_name: instruction_catalog
artifact_type: instruction_catalog
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
canonical_source_refs:
  - _vida/docs/plans/2026-03-08-vida-0.3-instruction-kernel-spec.md
  - vida.config.yaml
composition_order:
  - system_base
  - machine_binding
  - route_overlay
  - role_overlay
  - task_overlay
  - emergency_override
project_overlay_ref: overlays/project_overlay.yaml
default_bundle_ref: bundles/default_runtime.yaml
roles:
  orchestrator:
    mission: Own routing, synthesis, final quality gates, and lawful mutation orchestration.
    output_contract: final_verdict
    proof_requirements:
      - policy_evaluation_snapshot

  analyst:
    mission: Answer the blocking question and prepare bounded evidence for writer authorization.
    output_contract: analysis_event
    proof_requirements:
      - artifact_manifest

  writer:
    mission: Perform the single mutation-owning pass inside explicit write scope.
    output_contract: execution_event
    proof_requirements:
      - diff_summary
      - artifact_manifest

  coach:
    mission: Run formative post-write review and either approve forward or return for rework.
    output_contract: coach_event
    proof_requirements:
      - review_findings

  verifier:
    mission: Independently validate authored results and emit a lawful verification verdict.
    output_contract: verification_event
    proof_requirements:
      - verification_evidence
      - test_report

  approver:
    mission: Satisfy governance approval obligations when policy requires them.
    output_contract: approval_event
    proof_requirements:
      - approval_note

  synthesizer:
    mission: Integrate receipts and evidence into operator-facing closure output.
    output_contract: synthesis_event
    proof_requirements:
      - policy_evaluation_snapshot
