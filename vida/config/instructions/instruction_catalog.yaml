artifact_name: instruction_catalog
artifact_type: instruction_catalog
version: 1
revision: 2026-03-09
compatibility_class: direct_v1_kernel
canonical_source_refs:
  - docs/process/framework-source-lineage-index.md
  - docs/product/spec/instruction-artifact-model.md
  - vida.config.yaml
artifact_families:
  agent_definitions: agent-definitions.*
  instruction_contracts: instruction-contracts.*
  prompt_templates: prompt-templates.*
  command_instructions: command-instructions.*
  runtime_instructions: runtime-instructions.*
  diagnostic_instructions: diagnostic-instructions.*
  system_maps: system-maps.*
  references: references.*
  skills: skills/
  bundles: bundles/
  activation: activation/
versioning_policy:
  latest_markdown_revision_only: true
  markdown_footer_schema_version: 1
  unresolved_version_tuple_is_blocking: true
composition_order:
  - system_base
  - machine_binding
  - route_overlay
  - role_overlay
  - task_overlay
  - emergency_override
project_overlay_ref: overlays/project_overlay.yaml
default_bundle_ref: bundles/default_runtime.yaml
default_activation_policy_ref: activation/default_policy.yaml
projection_manifest_ref: projection_manifest.yaml
packaging_policy:
  packaged_artifacts_are_not_default_enabled: true
  skills_require_explicit_enablement: true
  runtime_inventory_is_distinct_from_binary_contents: true
roles:
  orchestrator:
    mission: Own routing, synthesis, final quality gates, and lawful mutation orchestration.
    output_contract: final_verdict
    proof_requirements:
      - policy_evaluation_snapshot

  analyst:
    mission: Answer the blocking question and prepare bounded evidence for writer authorization.
    output_contract: analysis_event
    proof_requirements:
      - artifact_manifest

  writer:
    mission: Perform the single mutation-owning pass inside explicit write scope.
    output_contract: execution_event
    proof_requirements:
      - diff_summary
      - artifact_manifest

  coach:
    mission: Run formative post-write review and either approve forward or return for rework.
    output_contract: coach_event
    proof_requirements:
      - review_findings

  verifier:
    mission: Independently validate authored results and emit a lawful verification verdict.
    output_contract: verification_event
    proof_requirements:
      - verification_evidence
      - test_report

  approver:
    mission: Satisfy governance approval obligations when policy requires them.
    output_contract: approval_event
    proof_requirements:
      - approval_note

  synthesizer:
    mission: Integrate receipts and evidence into operator-facing closure output.
    output_contract: synthesis_event
    proof_requirements:
      - policy_evaluation_snapshot
