artifact_name: project_overlay
artifact_type: instruction_overlay
version: 1
revision: 2026-03-09
compatibility_class: overlay_v1_bridge

# Framework-owned bridge/example overlay only.
# Live project-owned values belong in the root `vida.config.yaml`.
# Historical `vida-mobile` instance values were extracted to:
# `projects/vida-mobile/overlay.project_overlay.snapshot.yaml`

project:
  id: example-project
  overlay_version: 1

project_bootstrap:
  enabled: true
  docs_root: docs
  process_root: docs/process
  research_root: docs/research
  readme_doc: docs/README.md
  architecture_doc: docs/architecture.md
  decisions_doc: docs/decisions.md
  environments_doc: docs/environments.md
  project_operations_doc: docs/process/project-operations.md
  agent_system_doc: docs/process/agent-system-guide.md
  allow_scaffold_missing: true
  require_launch_confirmation: true

language_policy:
  user_communication: en
  reasoning: en
  documentation: en
  todo_protocol: en

protocol_activation:
  agent_system: false

autonomous_execution:
  next_task_boundary_analysis: true
  next_task_boundary_report: brief_plan
  next_task_boundary_report_gating: false
  dependent_coverage_autoupdate: true
  continue_after_reports: true
  validation_report_required_before_implementation: false

framework_self_diagnosis:
  enabled: false
  silent_mode: true
  auto_capture_bugs: true
  parent_issue: ""
  defer_fix_until_task_boundary: true
  session_reflection_required: true
  platform_direction: agentic_engineering_platform
  quality_token_efficiency: equal_weight
  session_reflection_criteria:
    - architecture_cleanliness
    - completeness
    - token_efficiency
    - orchestration_efficiency
    - instruction_clarity
    - instruction_runtime_consistency

pack_router_keywords:
  research: research
  spec: spec
  pool: pool
  pool_strong: form-task
  pool_dependency: dependency
  dev: implement
  bug: bug
  reflect: reflect
  reflect_strong: framework,self-analysis
