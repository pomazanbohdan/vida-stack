project:
  id: vida-stack
  overlay_version: 1

project_bootstrap:
  enabled: true
  docs_root: docs
  process_root: docs/process
  research_root: docs/research
  readme_doc: README.md
  architecture_doc: docs/product/architecture.md
  decisions_doc: docs/process/decisions.md
  environments_doc: docs/process/environments.md
  project_operations_doc: docs/process/project-operations.md
  agent_system_doc: docs/process/agent-system.md
  allow_scaffold_missing: false
  require_launch_confirmation: false

language_policy:
  user_communication: rust
  reasoning: rust
  documentation: rust
  todo_protocol: rust

host_environment:
  cli_system: codex
  codex:
    agents: &codex_agent_catalog
      junior:
        tier: junior
        description: Level 1 Codex lane for cheap bounded implementation packets that own one explicit write scope and return concrete delivery evidence without self-approving closure.
        rate: 1
        reasoning_band: low
        model: gpt-5.4
        model_reasoning_effort: low
        sandbox_mode: workspace-write
        default_runtime_role: worker
        runtime_roles:
          - worker
        task_classes:
          - implementation
          - delivery_task
          - execution_block
      middle:
        tier: middle
        description: Level 2 Codex lane for bounded specification, planning, spec-conformance coach review, and medium implementation packets when the work still fits one packet and does not require senior proof or architecture escalation.
        rate: 4
        reasoning_band: medium
        model: gpt-5.4
        model_reasoning_effort: medium
        sandbox_mode: workspace-write
        default_runtime_role: coach
        runtime_roles:
          - business_analyst
          - pm
          - coach
          - worker
        task_classes:
          - specification
          - planning
          - coach
          - implementation_medium
      senior:
        tier: senior
        description: Level 3 Codex lane for independent verification, proof-strength review, and high-confidence closure gates that fail closed on missing evidence.
        rate: 16
        reasoning_band: high
        model: gpt-5.4
        model_reasoning_effort: high
        sandbox_mode: read-only
        default_runtime_role: verifier
        runtime_roles:
          - verifier
          - prover
        task_classes:
          - verification
          - review
          - quality_gate
          - release_readiness
      architect:
        tier: architect
        description: Level 4 Codex lane for architecture preparation, hard escalation, and cross-scope conflict resolution when the normal implementer-coach-verifier path cannot close lawfully.
        rate: 32
        reasoning_band: xhigh
        model: gpt-5.4
        model_reasoning_effort: high
        sandbox_mode: read-only
        default_runtime_role: solution_architect
        runtime_roles:
          - solution_architect
        task_classes:
          - architecture
          - execution_preparation
          - hard_escalation
          - meta_analysis
  systems:
    codex:
      enabled: true
      execution_class: internal
      materialization_mode: codex_toml_catalog_render
      template_root: .codex
      runtime_root: .codex
      carriers: *codex_agent_catalog
    qwen:
      enabled: true
      execution_class: external
      materialization_mode: copy_tree_only
      template_root: .qwen
      runtime_root: .qwen
      carriers:
        qwen-primary:
          tier: qwen
          description: Placeholder carrier for future Qwen-powered lanes.
          rate: 4
          reasoning_band: medium
          default_runtime_role: worker
          runtime_roles:
            - worker
          task_classes:
            - implementation
            - research
    hermes:
      enabled: true
      execution_class: external
      materialization_mode: copy_tree_only
      template_root: .hermes
      runtime_root: .hermes
      carriers:
        hermes-primary:
          tier: hermes
          description: Placeholder carrier for the Hermes CLI.
          rate: 4
          reasoning_band: medium
          default_runtime_role: worker
          runtime_roles:
            - worker
          task_classes:
            - specification
            - planning
    opencode:
      enabled: true
      execution_class: external
      materialization_mode: copy_tree_only
      template_root: .opencode
      runtime_root: .opencode
      carriers:
        opencode-primary:
          tier: opencode
          description: Placeholder carrier for the OpenCode CLI.
          rate: 4
          reasoning_band: medium
          default_runtime_role: worker
          runtime_roles:
            - worker
          task_classes:
            - implementation

protocol_activation:
  agent_system: true

party_chat:
  enabled: true
  replaces_problem_party: true
  execution_mode: multi_agent
  model_routing_strategy: by_role
  default_board_size: small
  min_experts: 2
  max_experts: 16
  hard_cap_agents: 20
  dei_enabled: true
  single_agent:
    backend: internal_subagents
    model: internal_fast
  role_model_bindings:
