  enabled_project_profiles:
    - party_chat_facilitator_profile
    - party_chat_architect_profile
    - party_chat_runtime_systems_profile
    - party_chat_quality_verification_profile
    - party_chat_delivery_cost_profile
    - party_chat_product_scope_profile
    - party_chat_system_analyst_profile
    - party_chat_product_designer_profile
    - party_chat_security_safety_profile
    - party_chat_sre_observability_profile
    - party_chat_qa_tester_profile
    - party_chat_accessibility_ux_profile
    - party_chat_data_contracts_profile
    - party_chat_dx_tooling_profile
    - party_chat_pm_process_profile
    - party_chat_release_manager_profile
  enabled_project_flows:
    - party_chat_council_small
    - party_chat_council_large
    - party_chat_council_modern_full
  default_flow_set: verified
  role_selection:
    mode: auto
    fallback_role: orchestrator
    conversation_modes:
      scope_discussion:
        enabled: true
        role: business_analyst
        single_task_only: true
        tracked_flow_entry: spec-pack
        allow_freeform_chat: true
      pbi_discussion:
        enabled: true
        role: pm
        single_task_only: true
        tracked_flow_entry: work-pool-pack
        allow_freeform_chat: true
  validation:
    require_registry_files: true
    require_unique_ids: true
    require_framework_role_compatibility: true
    require_skill_role_compatibility: true
    require_profile_resolution: true
    require_flow_resolution: true
    fail_closed_on_validation_error: true

autonomous_execution:
  next_task_boundary_analysis: true
  next_task_boundary_report: none
  next_task_boundary_report_gating: false
  dependent_coverage_autoupdate: true
  agent_only_development: true
  continue_after_reports: true
  spec_ready_auto_development: true
  validation_report_required_before_implementation: true
  resume_after_validation_gate: true

framework_self_diagnosis:
  enabled: true
  silent_mode: true
  auto_capture_bugs: true
  parent_issue: vida-stack-2d9
  defer_fix_until_task_boundary: true
  session_reflection_required: true
  platform_direction: agentic_engineering_platform
  quality_token_efficiency: equal_weight
  session_reflection_criteria:
    - architecture_cleanliness
    - completeness
    - token_efficiency
    - orchestration_efficiency
    - instruction_clarity
    - instruction_runtime_consistency

pack_router_keywords:
  research: ресерч,дослід
  spec: спек,специф
  pool: пул,беклог,декомпоз
  pool_strong: форм-таск
  pool_dependency: залежност
  dev: розроб,продовж
  bug: помил,баг,виправ
  reflect: рефлекс,актуал,онови док
  reflect_strong: субагент,матриц,ініціаліз,фреймворк,самодіагност

agent_system:
  init_on_boot: true
  mode: native
  state_owner: orchestrator_only
  max_parallel_agents: 4

  scoring:
    rule: capability_first_then_score_guard_then_cheapest_tier
    consecutive_failure_limit: 3
    promotion_score: 75
    demotion_score: 45
    probation_success_runs: 2
    probation_task_runs: 2
    retirement_failure_limit: 8

  pricing:
    vendor_basis:
      openai: structured role configs and reasoning-effort tuning in Codex project config; prefer explicit task/runtime settings over implicit chat heuristics
      anthropic: structured prompt templates, explicit sections, and evaluation-backed refinement loops
      microsoft: record one bounded decision/design artifact per change and route on explicit cost-quality tradeoffs instead of ad hoc escalation

  subagents:
    internal_subagents:
      enabled: true
      subagent_backend_class: internal
      role: senior_internal
      orchestration_tier: senior
      cost_priority: premium
      budget_cost_units: 10
      profiles: internal_fast,internal_arch,internal_review
      default_profile: internal_fast
      capability_band: implementation_safe,architecture_safe,review_safe
      write_scope: orchestrator_native
      billing_tier: internal
      speed_tier: medium
      quality_tier: high
      specialties: implementation,architecture,integration,review,verification
    qwen_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: qwen
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      capability_band: read_only,review_safe,web_search
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: high
      specialties: long_context,agentic_coding,review
      dispatch:
        command: qwen
        static_args:
          - --auth-type
          - qwen-oauth
          - -y
          - -o
          - json
        model_flag: --model
        env:
          HOME: /home/unnamed/project/vida-stack/.vida/data/qwen-home
        web_search_mode: provider_configured
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 90
        no_output_timeout_seconds: 240
        progress_idle_timeout_seconds: 120
        max_runtime_extension_seconds: 90
      readiness:
        provider_failure:
          mode: recent_dir_contains_any
          path: /home/unnamed/project/vida-stack/.vida/data/qwen-home/.qwen/debug
          substring: exceeded your current quota
          max_age_seconds: 1800
          status: provider_failure_detected
          blocker_code: tool_execution_failed
          next_actions:
            - Wait for Qwen provider quota reset or switch qwen dispatch to API-key auth, then rerun `vida status --json`.
    hermes_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: hermes
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      models_hint: hermes/provider-configured
      default_model: hermes/provider-configured
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: medium
      specialties: planning,spec,review
      dispatch:
        command: hermes
        static_args:
          - chat
          - -Q
          - -q
        model_flag: --model
        provider_flag: --provider
        env:
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "600000"
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 60
        no_output_timeout_seconds: 180
        progress_idle_timeout_seconds: 105
        max_runtime_extension_seconds: 75
    opencode_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: opencode
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      models_hint: opencode/minimax-m2.5-free,opencode/gpt-5.1-codex-mini
      default_model: opencode/minimax-m2.5-free
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: fast
      quality_tier: medium
      specialties: planning,spec,review
      dispatch:
        command: opencode
        static_args:
          - run
        model_flag: --model
        env:
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "600000"
        workdir_flag: --dir
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 60
        no_output_timeout_seconds: 180
        progress_idle_timeout_seconds: 105
        max_runtime_extension_seconds: 75
      readiness:
        auth:
          mode: file_present
          path: ~/.local/share/opencode/auth.json
        model:
          mode: json_recent_ref
          path: ~/.local/state/opencode/model.json
          expected_ref: opencode/minimax-m2.5-free
          allow_dispatch_override: true
        provider_failure:
          mode: recent_dir_contains
          path: ~/.local/share/opencode/log
          substring: Authentication Failed
          max_age_seconds: 900
    kilo_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: kilo
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      models_hint: kilo/x-ai/grok-code-fast-1:optimized:free
      default_model: kilo/x-ai/grok-code-fast-1:optimized:free
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: fast
      quality_tier: medium
      specialties: planning,spec,review
      dispatch:
        command: kilo
        static_args:
          - run
          - --auto
        model_flag: --model
        workdir_flag: --dir
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 60
        no_output_timeout_seconds: 180
        progress_idle_timeout_seconds: 105
        max_runtime_extension_seconds: 75
      readiness:
        auth:
          mode: file_present
          path: ~/.local/share/kilo/auth.json
        model:
          mode: json_code_ref
          path: ~/.local/state/kilo/model.json
          expected_ref: kilo/x-ai/grok-code-fast-1:optimized:free
    vibe_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: vibe
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      models_hint: vibe/devstral-2
      default_model: vibe/devstral-2
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: medium
      specialties: planning,spec,review
      dispatch:
        command: vibe
        static_args:
          - -p
          - --output
          - text
          - --max-turns
          - "1"
        workdir_flag: --workdir
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 60
        no_output_timeout_seconds: 180
        progress_idle_timeout_seconds: 105
        max_runtime_extension_seconds: 75
      readiness:
        auth:
          mode: file_present
          path: ~/.vibe/.env
        model:
          mode: text_contains
          path: ~/.vibe/config.toml
          expected_ref: vibe/devstral-2
          expected_substring: 'active_model = "devstral-2"'
        provider_failure:
          mode: file_contains
          path: ~/.vibe/logs/vibe.log
          substring: Invalid API key
  routing:
    default:
      executor_backend: qwen_cli
      subagents: qwen_cli
      write_scope: none
      graph_strategy: deterministic_then_escalate
      deterministic_first: yes
      budget_policy: balanced
      max_budget_units: 4
      max_cli_subagent_calls: 5
      max_verification_passes: 1
      max_fallback_hops: 2
      max_total_runtime_seconds: 420
      verification_gate: subagent_return_contract
      dispatch_required: external_first_when_eligible
      external_first_required: yes
      local_execution_allowed: no
      local_execution_preferred: no
      cli_dispatch_required_if_delegating: yes
      direct_internal_bypass_forbidden: yes
      bridge_fallback_subagent: qwen_cli
      internal_escalation_trigger: write_scope_or_tie_break
      independent_verification_required: no
    status_diagnostic:
      executor_backend: qwen_cli
      subagents: qwen_cli
      fanout_executor_backends:
        - qwen_cli
        - hermes_cli
        - opencode_cli
        - kilo_cli
        - vibe_cli
      fanout_subagents: qwen_cli,hermes_cli,opencode_cli,kilo_cli,vibe_cli
      fanout_min_results: 1
      merge_policy: consensus_with_conflict_flag
      write_scope: none
      verification_gate: source_backed_summary
      max_runtime_seconds: 120
      min_output_bytes: 180
      graph_strategy: deterministic_then_escalate
      deterministic_first: yes
      budget_policy: strict
      max_budget_units: 0
      max_cli_subagent_calls: 5
      max_verification_passes: 0
      max_fallback_hops: 2
      max_total_runtime_seconds: 180
      dispatch_required: local_or_external_first
      external_first_required: no
      local_execution_allowed: yes
      local_execution_preferred: yes
      cli_dispatch_required_if_delegating: yes
      direct_internal_bypass_forbidden: yes
      fallback_executor_backend: internal_subagents
      bridge_fallback_subagent: internal_subagents
      internal_escalation_trigger: provider_exhausted_or_decision_conflict
      allowed_internal_reasons: provider_exhausted,quality_gap,semantic_conflict_without_majority,provider_exhausted_or_decision_conflict
      independent_verification_required: no
    research:
      executor_backend: qwen_cli
      subagents: qwen_cli
      profiles:
        internal_subagents: internal_fast
      fanout_subagents: qwen_cli
      fanout_min_results: 1
      merge_policy: consensus_with_conflict_flag
      write_scope: none
      verification_gate: source_backed_summary
      max_runtime_seconds: 180
      min_output_bytes: 260
      graph_strategy: deterministic_then_escalate
      deterministic_first: yes
      budget_policy: strict
      max_budget_units: 3
      max_cli_subagent_calls: 3
      max_verification_passes: 1
      max_fallback_hops: 2
      max_total_runtime_seconds: 360
      dispatch_required: fanout_then_synthesize
      external_first_required: yes
      web_search_required: yes
      fallback_executor_backend: internal_subagents
      bridge_fallback_subagent: internal_subagents
      internal_escalation_trigger: subagent_exhausted_or_quality_gap
      verification_route_task_class: verification_ensemble
      independent_verification_required: yes
    research_fast:
      executor_backend: qwen_cli
      subagents: qwen_cli
      profiles:
        internal_subagents: internal_fast
      fanout_subagents: qwen_cli
      fanout_min_results: 1
      merge_policy: consensus_with_conflict_flag
      write_scope: none
      verification_gate: source_backed_summary
      max_runtime_seconds: 150
      min_output_bytes: 220
      max_fallback_hops: 2
      dispatch_required: fanout_then_synthesize
      external_first_required: yes
      web_search_required: yes
      fallback_executor_backend: internal_subagents
      bridge_fallback_subagent: internal_subagents
      internal_escalation_trigger: subagent_exhausted_or_quality_gap
      verification_route_task_class: verification
