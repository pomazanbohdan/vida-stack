      fanout_subagents: qwen_cli
      fanout_min_results: 1
      merge_policy: consensus_with_conflict_flag
      write_scope: none
      verification_gate: source_backed_summary
      max_runtime_seconds: 240
      min_output_bytes: 320
      graph_strategy: deterministic_then_escalate
      deterministic_first: yes
      budget_policy: balanced
      max_budget_units: 4
      max_cli_subagent_calls: 5
      max_verification_passes: 1
      max_fallback_hops: 2
      max_total_runtime_seconds: 480
      dispatch_required: fanout_then_synthesize
      external_first_required: yes
      web_search_required: yes
      fallback_executor_backend: internal_subagents
