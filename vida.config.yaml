      internal_escalation_trigger: decision_critical_conflict
      verification_route_task_class: verification_ensemble
      independent_verification_required: yes
    analysis:
      executor_backend: qwen_cli
      subagents: qwen_cli
      profiles:
        internal_subagents: internal_fast
      fanout_subagents: qwen_cli
