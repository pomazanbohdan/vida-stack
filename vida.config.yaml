project:
  id: vida-stack
  overlay_version: 1

project_bootstrap:
  enabled: true
  docs_root: docs
  process_root: docs/process
  research_root: docs/framework/research
  readme_doc: README.md
  architecture_doc: docs/project-root-map.md
  decisions_doc: docs/product/spec/current-spec-map.md
  environments_doc: docs/product/spec/repository-two-project-surface-model.md
  project_operations_doc: docs/process/README.md
  agent_system_doc: docs/process/agent-system.md
  allow_scaffold_missing: true
  require_launch_confirmation: true

language_policy:
  user_communication: uk
  reasoning: en
  documentation: en
  todo_protocol: en

protocol_activation:
  agent_system: true

autonomous_execution:
  next_task_boundary_analysis: true
  next_task_boundary_report: brief_plan
  next_task_boundary_report_gating: false
  dependent_coverage_autoupdate: true

framework_self_diagnosis:
  enabled: true
  silent_mode: true
  auto_capture_bugs: true
  parent_issue: vida-stack-2d9
  defer_fix_until_task_boundary: true
  session_reflection_required: true
  platform_direction: agentic_engineering_platform
  quality_token_efficiency: equal_weight
  session_reflection_criteria:
    - architecture_cleanliness
    - completeness
    - token_efficiency
    - orchestration_efficiency
    - instruction_clarity
    - instruction_runtime_consistency

pack_router_keywords:
  research: ресерч,дослід
  spec: спек,специф
  pool: пул,беклог,декомпоз
  pool_strong: форм-таск
  pool_dependency: залежност
  dev: розроб,продовж
  bug: помил,баг,виправ
  reflect: рефлекс,актуал,онови док
  reflect_strong: субагент,матриц,ініціаліз,фреймворк,самодіагност

agent_system:
  init_on_boot: true
  mode: hybrid
  state_owner: orchestrator_only
  max_parallel_agents: 3

  scoring:
    consecutive_failure_limit: 3
    promotion_score: 75
    demotion_score: 45
    probation_success_runs: 2
    probation_task_runs: 2
    retirement_failure_limit: 8

  subagents:
    internal_subagents:
      enabled: true
      subagent_backend_class: internal
      role: senior_internal
      orchestration_tier: senior
      cost_priority: premium
      budget_cost_units: 10
      profiles: internal_fast,internal_arch,internal_review
      default_profile: internal_fast
      capability_band: implementation_safe,architecture_safe
      write_scope: orchestrator_native
      billing_tier: internal
      speed_tier: medium
      quality_tier: high
      specialties: implementation,architecture,integration
    codex_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: codex
      role: bridge_fallback
      orchestration_tier: bridge
      cost_priority: fallback
      budget_cost_units: 1
      models_hint: gpt-5.1-codex-mini,gpt-5.2-codex,gpt-5.3-codex
      default_model: gpt-5.1-codex-mini
      capability_band: read_only,review_safe,bounded_write_safe,web_search
      write_scope: scoped_only
      max_runtime_seconds: 240
      min_output_bytes: 260
      billing_tier: low
      speed_tier: medium
      quality_tier: high
      specialties: code_edit,deep_review,bounded_write
      dispatch:
        command: codex
        pre_static_args:
          - -c
          - model_reasoning_effort="high"
          - -a
          - never
        subcommand: exec
        static_args:
          - --ephemeral
          - -s
          - read-only
        write_static_args:
          - --ephemeral
          - -s
          - workspace-write
        workdir_flag: -C
        model_flag: -m
        models_cache_path: ~/.codex/models_cache.json
        web_search_mode: flag
        web_search_flag: --search
        web_probe_prompt: Use web search for one current public source and return exactly one line: VIDA_WEB_SEARCH_OK <url>
        web_probe_expect_substring: VIDA_WEB_SEARCH_OK
        web_probe_timeout_seconds: 25
        output_mode: file
        output_flag: -o
        prompt_mode: positional
        startup_timeout_seconds: 90
        no_output_timeout_seconds: 240
        progress_idle_timeout_seconds: 120
        max_runtime_extension_seconds: 90
    qwen_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: qwen
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      capability_band: read_only,review_safe,web_search
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: high
      specialties: long_context,agentic_coding,review
      dispatch:
        command: qwen
        static_args:
          - -y
          - -o
          - text
        env:
          HOME: /home/unnamed/project/vida-stack/.vida/data/qwen-home
        web_search_mode: provider_configured
        web_probe_prompt: Use web search for one current public source and return exactly one line: VIDA_WEB_SEARCH_OK <url>
        web_probe_expect_substring: VIDA_WEB_SEARCH_OK
        web_probe_timeout_seconds: 25
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 90
        no_output_timeout_seconds: 240
        progress_idle_timeout_seconds: 120
        max_runtime_extension_seconds: 90
    gemini_cli:
      enabled: true
      subagent_backend_class: external_cli
      detect_command: gemini
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 240
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: high
      specialties: research,review,long_context
      dispatch:
        command: gemini
        static_args:
          - -y
          - --output-format
          - text
        probe_static_args:
          - -y
          - --output-format
          - text
        probe_prompt: Return exactly one line: GEMINI_OK
        probe_expect_substring: GEMINI_OK
        probe_timeout_seconds: 20
        output_mode: stdout
        prompt_mode: flag
        prompt_flag: -p
        startup_timeout_seconds: 120
        no_output_timeout_seconds: 300
        progress_idle_timeout_seconds: 150
        max_runtime_extension_seconds: 120
    kilo_cli:
      enabled: false
      subagent_backend_class: external_cli
      detect_command: kilo
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      models_hint: kilo/minimax/minimax-m2.5:free
      default_model: kilo/minimax/minimax-m2.5:free
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: medium
      specialties: planning,spec,review
      dispatch:
        command: kilo
        static_args:
          - run
          - --auto
        env:
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "600000"
        workdir_flag: --dir
        model_flag: -m
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 60
        no_output_timeout_seconds: 180
        progress_idle_timeout_seconds: 105
        max_runtime_extension_seconds: 75
    opencode_cli:
      enabled: false
      subagent_backend_class: external_cli
      detect_command: opencode
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      models_hint: opencode/minimax-m2.5-free,opencode/gpt-5.1-codex-mini
      default_model: opencode/minimax-m2.5-free
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: fast
      quality_tier: medium
      specialties: planning,spec,review
      dispatch:
        command: opencode
        static_args:
          - run
        env:
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "600000"
        workdir_flag: --dir
        model_flag: -m
        output_mode: stdout
        prompt_mode: positional
        startup_timeout_seconds: 60
        no_output_timeout_seconds: 180
        progress_idle_timeout_seconds: 105
        max_runtime_extension_seconds: 75
    vibe_cli:
      enabled: false
      subagent_backend_class: external_cli
      detect_command: vibe
      role: free_primary
      orchestration_tier: external_free
      cost_priority: highest
      budget_cost_units: 0
      capability_band: read_only,review_safe
      write_scope: none
      max_runtime_seconds: 180
      min_output_bytes: 260
      billing_tier: free
      speed_tier: medium
      quality_tier: high
      specialties: engineering,cli_review,multi_file
      dispatch:
        command: vibe
        workdir_flag: --workdir
        output_mode: stdout
        prompt_mode: flag
        prompt_flag: -p
        startup_timeout_seconds: 45
        no_output_timeout_seconds: 120
        progress_idle_timeout_seconds: 90
        max_runtime_extension_seconds: 60

