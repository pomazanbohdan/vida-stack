name: Publish Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.tag }}"
          fi
          if [[ -z "${release_tag}" ]]; then
            echo "Failed to resolve release tag." >&2
            exit 1
          fi
          archive_base="vida-stack-${release_tag}"
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASE=${archive_base}" >> "$GITHUB_ENV"

      - name: Check out requested tag for manual publish
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git checkout --detach "refs/tags/${RELEASE_TAG}"

      - name: Stage framework payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          rm -rf dist/package
          mkdir -p dist/package/_vida dist/package/.vida
          cp AGENTS.md dist/package/AGENTS.md
          cp -R _vida/. dist/package/_vida/
          cp -R .vida/. dist/package/.vida/
          rm -f dist/package/_vida/CHANGELOG.md
          find dist/package/_vida -type d -name '__pycache__' -prune -exec rm -rf {} +
          find dist/package/_vida -type f -name '*.pyc' -delete

      - name: Build zip archive
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist/package
            zip -qr "../${ARCHIVE_BASE}.zip" AGENTS.md _vida .vida
          )

      - name: Build tar.gz archive
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "dist/${ARCHIVE_BASE}.tar.gz" -C dist/package AGENTS.md _vida .vida

      - name: Build release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          awk '
            BEGIN { capture=0 }
            /^## [0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}$/ {
              if (capture) exit
              capture=1
            }
            capture { print }
          ' _vida/CHANGELOG.md > dist/release-notes.md

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASE }}
          path: dist/
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Vida Stack ${RELEASE_TAG}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${title}" \
              --notes-file dist/release-notes.md
            gh release upload "${RELEASE_TAG}" dist/*.zip dist/*.tar.gz --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/*.zip dist/*.tar.gz \
              --title "${title}" \
              --notes-file dist/release-notes.md
          fi
