name: Publish Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.tag }}"
          fi
          if [[ -z "${release_tag}" ]]; then
            echo "Failed to resolve release tag." >&2
            exit 1
          fi
          archive_base="vida-stack-${release_tag}"
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASE=${archive_base}" >> "$GITHUB_ENV"

      - name: Check out requested tag for manual publish
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git checkout --detach "refs/tags/${RELEASE_TAG}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.8'

      - name: Install Python runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv
          .venv/bin/python3 -m ensurepip --upgrade >/dev/null 2>&1 || true
          .venv/bin/python3 -m pip install --upgrade pip
          .venv/bin/python3 -m pip install -r install/requirements-python.txt

      - name: Install Nim dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd taskflow-v0
          nimble install -y --depsOnly

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build-release.sh "${RELEASE_TAG}"

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASE }}
          path: dist/
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Vida Stack ${RELEASE_TAG}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${title}" \
              --notes-file dist/release-notes.md
            gh release upload "${RELEASE_TAG}" dist/*.zip dist/*.tar.gz dist/*.sha256 dist/vida-install.sh --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/*.zip dist/*.tar.gz dist/*.sha256 dist/vida-install.sh \
              --title "${title}" \
              --notes-file dist/release-notes.md
          fi
