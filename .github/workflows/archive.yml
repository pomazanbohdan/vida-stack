name: Build Archive

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set archive metadata from changelog
        shell: bash
        run: |
          set -euo pipefail
          raw_version="$(grep -m1 '^## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}$' _vida/CHANGELOG.md | sed 's/^## //')"
          if [[ -z "${raw_version}" ]]; then
            echo "Failed to detect top changelog version from _vida/CHANGELOG.md" >&2
            exit 1
          fi
          safe_version="${raw_version/:/}"
          safe_version="${safe_version/ /-}"
          archive_base="vida-stack-${safe_version}"
          echo "RAW_VERSION=${raw_version}" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=${safe_version}" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASE=${archive_base}" >> "$GITHUB_ENV"

      - name: Build zip archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=zip --output="dist/${ARCHIVE_BASE}.zip" HEAD

      - name: Build tar.gz archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output="dist/${ARCHIVE_BASE}.tar.gz" HEAD

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASE }}
          path: dist/
          if-no-files-found: error
