name: Build Archive

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set archive metadata from changelog
        shell: bash
        run: |
          set -euo pipefail
          raw_version="$(grep -m1 '^## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}$' _vida/CHANGELOG.md | sed 's/^## //')"
          if [[ -z "${raw_version}" ]]; then
            echo "Failed to detect top changelog version from _vida/CHANGELOG.md" >&2
            exit 1
          fi
          safe_version="${raw_version/:/}"
          safe_version="${safe_version/ /-}"
          archive_base="vida-stack-${safe_version}"
          echo "RAW_VERSION=${raw_version}" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=${safe_version}" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASE=${archive_base}" >> "$GITHUB_ENV"

      - name: Stage framework payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          rm -rf dist/package
          mkdir -p dist/package/_vida dist/package/.vida
          cp AGENTS.md dist/package/AGENTS.md
          cp -R _vida/. dist/package/_vida/
          cp -R .vida/. dist/package/.vida/
          rm -f dist/package/_vida/CHANGELOG.md
          find dist/package/_vida -type d -name '__pycache__' -prune -exec rm -rf {} +
          find dist/package/_vida -type f -name '*.pyc' -delete

      - name: Build zip archive
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist/package
            zip -qr "../${ARCHIVE_BASE}.zip" AGENTS.md _vida .vida
          )

      - name: Build tar.gz archive
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "dist/${ARCHIVE_BASE}.tar.gz" -C dist/package AGENTS.md _vida .vida

      - name: Build release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          awk '
            BEGIN { capture=0 }
            /^## [0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}$/ {
              if (capture) exit
              capture=1
            }
            capture { print }
          ' _vida/CHANGELOG.md > dist/release-notes.md

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASE }}
          path: dist/
          if-no-files-found: error

      - name: Ensure release tag exists
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${SAFE_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${SAFE_VERSION} already exists on origin."
            exit 0
          fi
          git tag "${SAFE_VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${SAFE_VERSION}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="Vida Stack ${RAW_VERSION}"
          if gh release view "${SAFE_VERSION}" >/dev/null 2>&1; then
            gh release edit "${SAFE_VERSION}" \
              --title "${title}" \
              --notes-file dist/release-notes.md
            gh release upload "${SAFE_VERSION}" dist/*.zip dist/*.tar.gz --clobber
          else
            gh release create "${SAFE_VERSION}" \
              dist/*.zip dist/*.tar.gz \
              --title "${title}" \
              --notes-file dist/release-notes.md
          fi
