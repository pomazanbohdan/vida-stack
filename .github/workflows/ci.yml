name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-rust:
    name: Build Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: vida-ci-${{ runner.os }}
          cache-on-failure: false

      - name: Build workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo build --workspace --locked

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: vida-ci-${{ runner.os }}
          cache-on-failure: false

      - name: Run cargo test
        shell: bash
        run: |
          set -euo pipefail
          cargo test --workspace --locked -- --test-threads=1

      - name: Build release assets and verify runtime-only package
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build-release.sh
          python3 - <<'PY'
          import json
          import tarfile
          from pathlib import Path

          manifests = sorted(Path("dist").glob("vida-stack-v*.manifest.json"))
          assert manifests, "release manifest was not generated"
          data = json.loads(manifests[0].read_text())
          expected_roots = ["AGENTS.md", "AGENTS.sidecar.md", ".codex/", ".qwen/", ".kilo/", ".opencode/", "bin/vida", "bin/taskflow", "bin/docflow", "install/assets/", "vida/"]
          assert data["included_roots"] == expected_roots, data["included_roots"]
          assert data["installed_entrypoints"] == ["vida", "taskflow", "docflow", "vida docflow", "vida taskflow"], data["installed_entrypoints"]
          assert data["installed_compatibility_contracts"]["taskflow"] == "canonical taskflow runtime", data["installed_compatibility_contracts"]
          assert data["installed_compatibility_contracts"]["docflow"] == "canonical docflow runtime", data["installed_compatibility_contracts"]
          assert data["bundled_binaries"] == ["bin/vida", "bin/taskflow", "bin/docflow"], data["bundled_binaries"]
          assert data["installer_managed_runtimes"] == ["vida", "taskflow", "docflow"], data["installer_managed_runtimes"]

          archive = sorted(Path("dist").glob("vida-stack-v*.tar.gz"))[0]
          with tarfile.open(archive, "r:gz") as tf:
            names = tf.getnames()

          assert any(name.endswith("/AGENTS.md") for name in names), names[:20]
          assert any(name.endswith("/AGENTS.sidecar.md") for name in names), names[:20]
          assert any(name.endswith("/bin/vida") for name in names), names[:20]
          assert any(name.endswith("/bin/taskflow") for name in names), names[:20]
          assert any(name.endswith("/bin/docflow") for name in names), names[:20]
          assert any("/.codex/config.toml" in name for name in names), names[:20]
          assert any("/vida/root-map.md" in name for name in names), names[:20]
          assert any("/install/assets/vida.config.yaml.template" in name for name in names), names[:20]
          assert any("/install/assets/feature-design-document.template.md" in name for name in names), names[:20]

          forbidden_roots = ("crates", "scripts", "tests", "target")
          leaked = []
          for name in names:
            parts = name.split("/", 1)
            if len(parts) < 2:
              continue
            rel = parts[1].rstrip("/")
            if not rel:
              continue
            first = rel.split("/", 1)[0]
            if first in forbidden_roots:
              leaked.append(name)
          assert not leaked, leaked
          PY
          bash dist/vida-install.sh help >/tmp/vida-install-help.txt
          test -s /tmp/vida-install-help.txt
          pwsh -NoProfile -ExecutionPolicy Bypass -File dist/vida-install.ps1 help > /tmp/vida-install-ps-help.txt
          test -s /tmp/vida-install-ps-help.txt

      - name: Run local installer smoke
        shell: bash
        run: |
          set -euo pipefail
          TMP_ROOT="$(mktemp -d)"
          INSTALL_ROOT="$TMP_ROOT/install-root"
          TMP_BIN="$TMP_ROOT/bin"
          TMP_STATE="$TMP_ROOT/state"
          TMP_PROJECT="$TMP_ROOT/project"
          ARCHIVE_PATH="$(find dist -maxdepth 1 -name 'vida-stack-v*.tar.gz' | head -n 1)"
          test -n "$ARCHIVE_PATH"

          mkdir -p "$TMP_BIN" "$TMP_STATE" "$TMP_PROJECT"

          bash dist/vida-install.sh install --archive "$ARCHIVE_PATH" --root "$INSTALL_ROOT" --bin-dir "$TMP_BIN" --force
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" bash dist/vida-install.sh doctor --root "$INSTALL_ROOT" --bin-dir "$TMP_BIN"

          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida root >/tmp/vida-root.txt
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida boot --state-dir "$TMP_STATE"
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida doctor --state-dir "$TMP_STATE" >/tmp/vida-doctor.txt
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida status --state-dir "$TMP_STATE" --json >/tmp/vida-status.json
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida doctor --state-dir "$TMP_STATE" --json >/tmp/vida-doctor-json.txt
          PATH="$TMP_BIN:$PATH" taskflow help >/tmp/taskflow-help.txt
          PATH="$TMP_BIN:$PATH" docflow --help >/tmp/docflow-help.txt
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida taskflow help >/tmp/vida-taskflow-help.txt
          VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida docflow help >/tmp/vida-docflow-help.txt

          PATH="$TMP_BIN:$PATH" docflow init >/tmp/docflow-init.txt
          PATH="$TMP_BIN:$PATH" docflow init --json >/tmp/docflow-init.json

          (
            cd "$TMP_PROJECT"
            VIDA_HOME="$INSTALL_ROOT" VIDA_ROOT="$INSTALL_ROOT/current" PATH="$TMP_BIN:$PATH" vida init >/tmp/vida-init.txt
          )

          grep -q "TaskFlow CLI" /tmp/taskflow-help.txt
          grep -q "Standalone DocFlow CLI" /tmp/docflow-help.txt
          grep -q "mode: agent_bootstrap" /tmp/docflow-init.txt
          grep -q '"mode":"agent_bootstrap"' /tmp/docflow-init.json
          grep -q "$INSTALL_ROOT/current" /tmp/vida-root.txt
          grep -q "storage metadata: ok" /tmp/vida-doctor.txt
          grep -q '"surface": "vida status"' /tmp/vida-status.json
          test -f "$TMP_PROJECT/AGENTS.md"
          test -f "$TMP_PROJECT/AGENTS.sidecar.md"
          test -f "$TMP_PROJECT/vida.config.yaml"

      - name: Run docflow validation
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p vida -- docflow check-file --path README.md
          cargo run -p vida -- docflow check-file --path VERSION-PLAN.md
          cargo run -p vida -- docflow readiness-check --profile active-canon

      - name: Run runtime smoke
        shell: bash
        run: |
          set -euo pipefail
          STATE_DIR="_temp/ci-runtime-state"
          rm -rf "$STATE_DIR"
          cargo run -p vida -- boot --state-dir "$STATE_DIR"
          cargo run -p vida -- status --state-dir "$STATE_DIR" --json >/tmp/ci-status.json
          cargo run -p vida -- doctor --state-dir "$STATE_DIR" --json >/tmp/ci-doctor.json
          cargo run -p vida -- task list --state-dir "$STATE_DIR" --json >/tmp/ci-task-list.json
          cargo run -p vida -- task ready --state-dir "$STATE_DIR" --json >/tmp/ci-task-ready.json
          cargo run -p vida -- task blocked --state-dir "$STATE_DIR" --json >/tmp/ci-task-blocked.json
          cargo run -p vida -- orchestrator-init --state-dir "$STATE_DIR" --json >/tmp/ci-orchestrator-init.json
          cargo run -p vida -- agent-init --role worker --state-dir "$STATE_DIR" --json >/tmp/ci-agent-init.json
          cargo run -p vida -- project-activator --json >/tmp/ci-project-activator.json
          cargo run -p vida -- protocol view bootstrap/router >/tmp/ci-protocol-router.txt

  validate-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: vida-ci-windows-installer
          cache-on-failure: false

      - name: Build Windows release assets
        shell: bash
        run: |
          set -euo pipefail
          export VIDA_RELEASE_SUFFIX=windows-x86_64
          bash scripts/build-release.sh

      - name: Run Windows installer smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tmpRoot = Join-Path $env:RUNNER_TEMP "vida-installer-smoke"
          $installRoot = Join-Path $tmpRoot "install-root"
          $binDir = Join-Path $tmpRoot "bin"
          $projectDir = Join-Path $tmpRoot "project"
          New-Item -ItemType Directory -Force -Path $binDir, $projectDir | Out-Null
          $archive = Get-ChildItem -LiteralPath dist -Filter "vida-stack-v*-windows-x86_64.zip" | Select-Object -First 1
          if (-not $archive) { throw "Windows release zip was not generated" }

          pwsh -NoProfile -ExecutionPolicy Bypass -File dist/vida-install.ps1 install -Archive $archive.FullName -Root $installRoot -BinDir $binDir -Force
          if ($LASTEXITCODE -ne 0) { throw "Windows installer install failed" }
          pwsh -NoProfile -ExecutionPolicy Bypass -File dist/vida-install.ps1 doctor -Root $installRoot -BinDir $binDir
          if ($LASTEXITCODE -ne 0) { throw "Windows installer doctor failed" }

          $env:VIDA_HOME = $installRoot
          $env:VIDA_ROOT = Join-Path $installRoot "current"
          $env:PATH = "$binDir;$env:PATH"
          vida root | Out-File -FilePath (Join-Path $tmpRoot "vida-root.txt") -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "vida root failed" }
          vida --help | Out-File -FilePath (Join-Path $tmpRoot "vida-help.txt") -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "vida help failed" }
          taskflow help | Out-File -FilePath (Join-Path $tmpRoot "taskflow-help.txt") -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "taskflow help failed" }
          docflow --help | Out-File -FilePath (Join-Path $tmpRoot "docflow-help.txt") -Encoding utf8
          if ($LASTEXITCODE -ne 0) { throw "docflow help failed" }

          Push-Location $projectDir
          try {
            vida init | Out-File -FilePath (Join-Path $tmpRoot "vida-init.txt") -Encoding utf8
            if ($LASTEXITCODE -ne 0) { throw "vida init failed" }
          } finally {
            Pop-Location
          }

          Select-String -LiteralPath (Join-Path $tmpRoot "taskflow-help.txt") -Pattern "TaskFlow CLI"
          Select-String -LiteralPath (Join-Path $tmpRoot "docflow-help.txt") -Pattern "Standalone DocFlow CLI"
          Select-String -LiteralPath (Join-Path $tmpRoot "vida-root.txt") -Pattern ([regex]::Escape((Join-Path $installRoot "current")))
          if (-not (Test-Path -LiteralPath (Join-Path $projectDir "AGENTS.md"))) { throw "AGENTS.md was not bootstrapped" }
          if (-not (Test-Path -LiteralPath (Join-Path $projectDir "AGENTS.sidecar.md"))) { throw "AGENTS.sidecar.md was not bootstrapped" }
          if (-not (Test-Path -LiteralPath (Join-Path $projectDir "vida.config.yaml"))) { throw "vida.config.yaml was not bootstrapped" }
          if (-not (Test-Path -LiteralPath (Join-Path $projectDir "docs/product/spec/templates/feature-design-document.template.md"))) { throw "feature design template was not bootstrapped" }
